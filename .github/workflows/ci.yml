name: CI
run-name: CI / ${{ github.ref_name }} / ${{ github.event.head_commit.message || github.event_name }}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:

jobs:
  rust-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Run Rust quality gate
        run: make quality-rust

  rust-live-smoke:
    runs-on: ubuntu-latest
    needs:
      - rust-quality
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Install live smoke dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl lsof
      - name: Run Rust live smoke
        run: make test-rust-live

  rust-release-linux-amd64:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - rust-quality
      - rust-live-smoke
    env:
      RUSTFLAGS: -C debuginfo=0
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Build Linux amd64 Rust release binary
        run: cargo build --release --manifest-path rust/Cargo.toml --bin grafana-util
      - name: Package Linux amd64 Rust release archive
        run: |
          mkdir -p release-assets/rust
          tar -C rust/target/release -czf \
            "release-assets/rust/grafana-utils-rust-linux-amd64-${GITHUB_REF_NAME}.tar.gz" \
            grafana-util
      - name: Upload Linux amd64 Rust release archive
        uses: actions/upload-artifact@v7
        with:
          name: rust-release-linux-amd64-${{ github.ref_name }}-${{ github.sha }}
          path: release-assets/rust/grafana-utils-rust-linux-amd64-${{ github.ref_name }}.tar.gz
          if-no-files-found: error

  rust-release-linux-amd64-browser:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - rust-quality
      - rust-live-smoke
    env:
      RUSTFLAGS: -C debuginfo=0
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Build Linux amd64 browser-enabled Rust release binary
        run: cargo build --release --manifest-path rust/Cargo.toml --bin grafana-util --features browser
      - name: Package Linux amd64 browser-enabled Rust release archive
        run: |
          mkdir -p release-assets/rust
          tar -C rust/target/release -czf \
            "release-assets/rust/grafana-utils-rust-linux-amd64-browser-${GITHUB_REF_NAME}.tar.gz" \
            grafana-util
      - name: Upload Linux amd64 browser-enabled Rust release archive
        uses: actions/upload-artifact@v7
        with:
          name: rust-release-linux-amd64-browser-${{ github.ref_name }}-${{ github.sha }}
          path: release-assets/rust/grafana-utils-rust-linux-amd64-browser-${{ github.ref_name }}.tar.gz
          if-no-files-found: error

  rust-release-macos-arm64:
    runs-on: macos-14
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - rust-quality
      - rust-live-smoke
    env:
      RUSTFLAGS: -C debuginfo=0
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Build macOS arm64 Rust release binary
        run: cargo build --release --manifest-path rust/Cargo.toml --bin grafana-util
      - name: Package macOS arm64 Rust release archive
        run: |
          mkdir -p release-assets/rust
          tar -C rust/target/release -czf \
            "release-assets/rust/grafana-utils-rust-macos-arm64-${GITHUB_REF_NAME}.tar.gz" \
            grafana-util
      - name: Upload macOS arm64 Rust release archive
        uses: actions/upload-artifact@v7
        with:
          name: rust-release-macos-arm64-${{ github.ref_name }}-${{ github.sha }}
          path: release-assets/rust/grafana-utils-rust-macos-arm64-${{ github.ref_name }}.tar.gz
          if-no-files-found: error

  rust-release-macos-arm64-browser:
    runs-on: macos-14
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - rust-quality
      - rust-live-smoke
    env:
      RUSTFLAGS: -C debuginfo=0
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Build macOS arm64 browser-enabled Rust release binary
        run: cargo build --release --manifest-path rust/Cargo.toml --bin grafana-util --features browser
      - name: Package macOS arm64 browser-enabled Rust release archive
        run: |
          mkdir -p release-assets/rust
          tar -C rust/target/release -czf \
            "release-assets/rust/grafana-utils-rust-macos-arm64-browser-${GITHUB_REF_NAME}.tar.gz" \
            grafana-util
      - name: Upload macOS arm64 browser-enabled Rust release archive
        uses: actions/upload-artifact@v7
        with:
          name: rust-release-macos-arm64-browser-${{ github.ref_name }}-${{ github.sha }}
          path: release-assets/rust/grafana-utils-rust-macos-arm64-browser-${{ github.ref_name }}.tar.gz
          if-no-files-found: error

  github-release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - rust-release-linux-amd64
      - rust-release-linux-amd64-browser
      - rust-release-macos-arm64
      - rust-release-macos-arm64-browser
    permissions:
      contents: write
    steps:
      - name: Download Linux amd64 Rust release archive
        uses: actions/download-artifact@v8
        with:
          name: rust-release-linux-amd64-${{ github.ref_name }}-${{ github.sha }}
          path: release-assets/rust
      - name: Download Linux amd64 browser-enabled Rust release archive
        uses: actions/download-artifact@v8
        with:
          name: rust-release-linux-amd64-browser-${{ github.ref_name }}-${{ github.sha }}
          path: release-assets/rust
      - name: Download macOS arm64 Rust release archive
        uses: actions/download-artifact@v8
        with:
          name: rust-release-macos-arm64-${{ github.ref_name }}-${{ github.sha }}
          path: release-assets/rust
      - name: Download macOS arm64 browser-enabled Rust release archive
        uses: actions/download-artifact@v8
        with:
          name: rust-release-macos-arm64-browser-${{ github.ref_name }}-${{ github.sha }}
          path: release-assets/rust
      - name: Publish or update GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" \
              release-assets/rust/* \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          else
            gh release create "${GITHUB_REF_NAME}" \
              release-assets/rust/* \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
          fi

  installer-release-smoke:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - github-release
    permissions:
      contents: read
    steps:
      - name: Install pinned release from tag-pinned installer
        env:
          EXPECTED_VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          install_dir="${RUNNER_TEMP}/pinned-bin"
          mkdir -p "${install_dir}"
          installer_url="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${GITHUB_REF_NAME}/scripts/install.sh"
          for attempt in 1 2 3 4 5; do
            if curl -fsSL "${installer_url}" | BIN_DIR="${install_dir}" VERSION="${EXPECTED_VERSION}" sh; then
              break
            fi
            if [ "${attempt}" -eq 5 ]; then
              echo "Pinned release installer smoke failed after ${attempt} attempts." >&2
              exit 1
            fi
            sleep 10
          done
          expected_text="grafana-util ${EXPECTED_VERSION#v}"
          "${install_dir}/grafana-util" --version | tee "${RUNNER_TEMP}/pinned-version.txt"
          grep -F "${expected_text}" "${RUNNER_TEMP}/pinned-version.txt"

      - name: Install latest published release from main installer
        env:
          EXPECTED_VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          install_dir="${RUNNER_TEMP}/latest-bin"
          mkdir -p "${install_dir}"
          installer_url="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/main/scripts/install.sh"
          for attempt in 1 2 3 4 5; do
            if curl -fsSL "${installer_url}" | BIN_DIR="${install_dir}" sh; then
              break
            fi
            if [ "${attempt}" -eq 5 ]; then
              echo "Latest release installer smoke failed after ${attempt} attempts." >&2
              exit 1
            fi
            sleep 10
          done
          expected_text="grafana-util ${EXPECTED_VERSION#v}"
          "${install_dir}/grafana-util" --version | tee "${RUNNER_TEMP}/latest-version.txt"
          grep -F "${expected_text}" "${RUNNER_TEMP}/latest-version.txt"
